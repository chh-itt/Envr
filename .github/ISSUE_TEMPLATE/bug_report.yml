name: Bug report
description: Report a reproducible problem in envr
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        For suspected security vulnerabilities, please do not file a public issue.
        Follow the private reporting instructions in `SECURITY.md` instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and commands when possible.
      placeholder: |
        1. Run `...`
        2. Run `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: envr_version
    attributes:
      label: envr version
      description: Output of `envr --version` or commit SHA if built from source.
      placeholder: envr 0.1.0 / commit abc123
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      description: How did you install envr?
      options:
        - Built from source with cargo
        - Downloaded release artifact
        - Local package or internal distribution
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: Architecture
      placeholder: x86_64 / arm64
    validations:
      required: true

  - type: input
    id: runtime_kind
    attributes:
      label: Runtime kind
      description: Which runtime provider is involved?
      placeholder: node / python / rust / zig
    validations:
      required: false

  - type: input
    id: runtime_version
    attributes:
      label: Runtime version
      description: Which runtime version were you trying to install, resolve, or execute?
      placeholder: 22.0.0
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
      placeholder: envr install node 22.0.0
      render: shell
    validations:
      required: true

  - type: dropdown
    id: mirror_usage
    attributes:
      label: Mirror or custom source usage
      description: Were you using a mirror, custom registry/index, or custom source settings?
      options:
        - No
        - Yes, mirror or custom source configured
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: offline_mode
    attributes:
      label: Offline or cached-only workflow
      description: Were you using offline mode, bundle workflows, or cached indexes?
      options:
        - No
        - Yes
        - Not sure
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: `envr doctor` output
      description: Paste the relevant output from `envr doctor` if available.
      render: shell
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics export
      description: If you ran `envr diagnostics export`, provide the path or summarize what was produced. Remove secrets before posting.
      placeholder: Path to the zip, or a short sanitized summary.
    validations:
      required: false

  - type: textarea
    id: config_context
    attributes:
      label: Relevant configuration context
      description: Mention custom runtime root, shell integration, project `.envr.toml`, or cache/mirror settings if relevant.
      placeholder: Any extra context that may affect reproduction.
    validations:
      required: false

  - type: textarea
    id: logs_errors
    attributes:
      label: Error output or logs
      description: Paste relevant stderr, JSON output, or stack traces. Remove secrets before posting.
      render: shell
    validations:
      required: false
