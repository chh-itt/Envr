name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy, rustfmt

      - name: Install Linux GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libwayland-dev libxkbcommon-dev libx11-dev libxi-dev libgl1-mesa-dev

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Workspace check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace --all-targets

      - name: i18n lint
        run: cargo run -p envr-i18n-lint --locked

      - name: cargo deny check
        run: cargo deny check

  build-windows-x64:
    name: Build Windows x86_64 artifacts
    runs-on: windows-latest
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Package zip
        shell: pwsh
        run: ./scripts/package-windows-release.ps1 -Version $env:REL_VER -Arch x86_64

      - name: Package MSI + setup
        shell: pwsh
        run: ./scripts/package-windows-bundle.ps1 -Version $env:REL_VER -Arch x64

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-windows-x64-${{ github.ref_name }}
          path: |
            dist/*.zip
            dist/*.msi
            dist/*.exe
            dist/**/SHA256SUMS.txt
            dist/SHA256SUMS-archive.txt
            dist/SHA256SUMS-msi.txt
            dist/SHA256SUMS-setup.txt
          if-no-files-found: error

  build-windows-arm64:
    name: Build Windows ARM64 archive
    runs-on: windows-latest
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-pc-windows-msvc

      - name: Setup x64 Windows Rust target for MSI/setup
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Package zip
        shell: pwsh
        run: ./scripts/package-windows-release.ps1 -Version $env:REL_VER -Arch arm64 -Target aarch64-pc-windows-msvc

      - name: Package MSI + setup
        shell: pwsh
        run: ./scripts/package-windows-bundle.ps1 -Version $env:REL_VER -Arch arm64

      - name: Upload Windows ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-windows-arm64-${{ github.ref_name }}
          path: |
            dist/*.zip
            dist/SHA256SUMS-archive.txt
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x86_64 archive
    runs-on: ubuntu-latest
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Package tar.gz
        shell: bash
        run: ./scripts/package-unix-release.sh --version "$REL_VER" --platform linux --arch x86_64

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-linux-x64-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt
            dist/**/SHA256SUMS.txt
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64 archive
    runs-on: ubuntu-latest
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install ARM64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Package tar.gz
        shell: bash
        run: ./scripts/package-unix-release.sh --version "$REL_VER" --platform linux --arch arm64 --target aarch64-unknown-linux-gnu

      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-linux-arm64-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt
            dist/**/SHA256SUMS.txt
          if-no-files-found: error

  build-macos-intel:
    name: Build macOS x86_64 archive
    runs-on: macos-13
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-apple-darwin

      - name: Package tar.gz
        shell: bash
        run: ./scripts/package-unix-release.sh --version "$REL_VER" --platform macos --arch x86_64 --target x86_64-apple-darwin

      - name: Upload macOS x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-macos-x86_64-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt
            dist/**/SHA256SUMS.txt
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS arm64 archive
    runs-on: macos-latest
    needs: verify
    env:
      REL_VER: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin

      - name: Package tar.gz
        shell: bash
        run: ./scripts/package-unix-release.sh --version "$REL_VER" --platform macos --arch arm64 --target aarch64-apple-darwin

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: envr-macos-arm64-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt
            dist/**/SHA256SUMS.txt
          if-no-files-found: error

  publish:
    name: Create draft GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-x64
      - build-windows-arm64
      - build-linux-x64
      - build-linux-arm64
      - build-macos-intel
      - build-macos-arm64
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show collected assets
        shell: bash
        run: find release-assets -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/**/*
