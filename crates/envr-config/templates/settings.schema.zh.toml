# =============================================================================
# envr 全局配置 settings.toml — 模板（含中文说明与默认值）
# 实际路径：`envr config path`；勿直接复制未知段落到生产环境，按需取消注释。
# =============================================================================

# -----------------------------------------------------------------------------
# paths — 安装与数据目录
# -----------------------------------------------------------------------------
# runtime_root：运行时根目录（node/python/… 版本与 shims）。留空则使用平台默认。
# 可被环境变量 ENVR_RUNTIME_ROOT 覆盖（优先级更高）。
[paths]
# runtime_root = "D:\\envr-data"

# -----------------------------------------------------------------------------
# behavior — CLI / 安装行为
# -----------------------------------------------------------------------------
[behavior]
# 安装成功后是否清理临时下载文件（逐步由各 provider 采用）
cleanup_downloads_after_install = false

# -----------------------------------------------------------------------------
# mirror — 下载镜像总开关（影响多语言包源解析）
# -----------------------------------------------------------------------------
# mode：official | auto | manual | offline
#   auto — 根据界面语言等启发式选择国内/官方源
#   manual — 必须设置 manual_id
#   offline — 禁止联网拉取索引（仅用本地缓存）
[mirror]
mode = "auto"
# manual_id = "npmmirror"

# -----------------------------------------------------------------------------
# download — 并发与重试
# -----------------------------------------------------------------------------
[download]
max_concurrent_downloads = 4
retry_max = 3

# -----------------------------------------------------------------------------
# i18n — CLI / GUI 语言
# -----------------------------------------------------------------------------
# locale：follow_system | zh_cn | en_us
[i18n]
locale = "follow_system"

# -----------------------------------------------------------------------------
# appearance — GUI 外观（CLI 可忽略）
# -----------------------------------------------------------------------------
[appearance]
# theme_mode：follow_system | light | dark
theme_mode = "follow_system"
# accent_color = "#3B82F6"

[appearance.font]
# mode：auto | custom；custom 时必须填写 family
mode = "auto"
# family = "Segoe UI"

# -----------------------------------------------------------------------------
# gui — 图形界面状态（CLI 可忽略）
# -----------------------------------------------------------------------------
[gui.downloads_panel]
visible = true
expanded = true
x = 12
y = 12
# x_frac / y_frac：0.0–1.0 归一化坐标（可选）

# 仪表盘「运行时概览」卡片顺序 + 运行时页横向标签顺序；hidden 不在横向栏显示，仅在仪表盘尾部/折叠区展示。
[gui.runtime_layout]
# order = ["node", "python", "java", "go", "rust", "ruby", "elixir", "erlang", "php", "deno", "bun", "dotnet"]
# hidden = ["bun"]

# -----------------------------------------------------------------------------
# runtime — 各语言运行时与代理
# -----------------------------------------------------------------------------

# Node：index.json 源 + npm registry 预设 + shim 是否劫持 PATH
[runtime.node]
# download_source：auto | domestic | official
download_source = "auto"
# npm_registry_mode：auto | domestic | official | restore（不改动用户 .npmrc）
npm_registry_mode = "auto"
path_proxy_enabled = true

[runtime.python]
download_source = "auto"
# windows_distribution：auto | nuget | embeddable
# - auto：优先使用 NuGet 完整发行版（包含 venv 等标准库），失败则回退 embeddable zip
# - nuget：强制使用 NuGet（python/pythonx86/pythonarm64）
# - embeddable：使用 python.org embeddable zip（可能缺少 venv）
windows_distribution = "auto"
# pip_registry_mode：auto | domestic | official | restore
pip_registry_mode = "auto"
path_proxy_enabled = true

[runtime.java]
current_distro = "temurin"
# distro：temurin | oracle_open_jdk | amazon_corretto | microsoft | oracle_jdk | azul_zulu | alibaba_dragonwell | open_jdk
download_source = "auto"
path_proxy_enabled = true

[runtime.kotlin]
path_proxy_enabled = true

[runtime.scala]
path_proxy_enabled = true

[runtime.clojure]
path_proxy_enabled = true

[runtime.groovy]
path_proxy_enabled = true

[runtime.terraform]
path_proxy_enabled = true

[runtime.v]
path_proxy_enabled = true

[runtime.gleam]
path_proxy_enabled = true

[runtime.dart]
path_proxy_enabled = true

[runtime.flutter]
path_proxy_enabled = true

[runtime.go]
download_source = "auto"
# proxy_mode：auto | domestic | official | direct | custom
proxy_mode = "auto"
# proxy_mode = custom 时需填写 proxy_custom 或兼容字段 goproxy
# proxy_custom = "https://goproxy.cn,direct"
# private_patterns：私有模块 glob，逗号分隔；会注入 GOPRIVATE / GONOSUMDB / GONOPROXY
# private_patterns = "*.corp.example.com"
path_proxy_enabled = true

[runtime.rust]
download_source = "auto"

[runtime.ruby]
# ruby 运行时：shim 是否劫持 PATH（会影响 ruby/gem/bundle/irb 的解析）
path_proxy_enabled = true

[runtime.php]
download_source = "auto"
# windows_build：nts | ts
windows_build = "nts"
path_proxy_enabled = true

[runtime.deno]
download_source = "auto"
package_source = "auto"
path_proxy_enabled = true

[runtime.bun]
package_source = "auto"
path_proxy_enabled = true
# global_bin_dir = "自定义 bun 全局 bin，用于 shim 同步"

[runtime.dotnet]
# 当为 false 时，dotnet shim 将透传到系统 PATH 中的 dotnet 可执行文件
path_proxy_enabled = true

[runtime.zig]
# 当为 false 时，zig shim 将透传到系统 PATH 中的 zig 可执行文件
path_proxy_enabled = true

[runtime.julia]
# 当为 false 时，julia shim 将透传到系统 PATH 中的 julia 可执行文件
path_proxy_enabled = true

[runtime.janet]
# 当为 false 时，janet / jpm shim 将透传到系统 PATH 中的同名可执行文件
path_proxy_enabled = true

[runtime.c3]
# 当为 false 时，c3c shim 将透传到系统 PATH 中的 c3c 可执行文件
path_proxy_enabled = true

[runtime.babashka]
# 当为 false 时，bb shim 将透传到系统 PATH 中的 bb 可执行文件
path_proxy_enabled = true

[runtime.sbcl]
# 当为 false 时，sbcl shim 将透传到系统 PATH 中的 sbcl 可执行文件
path_proxy_enabled = true

[runtime.lua]
# 当为 false 时，lua / luac shim 将透传到系统 PATH 中的同名可执行文件
path_proxy_enabled = true

[runtime.nim]
# 当为 false 时，nim shim 将透传到系统 PATH 中的 nim 可执行文件
path_proxy_enabled = true

[runtime.crystal]
# 当为 false 时，crystal shim 将透传到系统 PATH 中的 crystal 可执行文件
path_proxy_enabled = true

[runtime.perl]
# 当为 false 时，perl shim 将透传到系统 PATH 中的 perl 可执行文件
path_proxy_enabled = true

[runtime.r]
# 当为 false 时，R / Rscript shim 将透传到系统 PATH 中的同名可执行文件
path_proxy_enabled = true
