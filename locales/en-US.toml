cli.help.cmd.use = "设置全局默认运行时版本（写入 runtime root 下的 current；类似 nvm / fnm）"
cli.help.cmd.which = "定位 shim 或可执行文件"
cli.help.cmd.why = "说明某运行时如何解析到当前安装目录（项目 pin / 全局 current）"
cli.help.command_groups = "Command groups (same order as the list above):\n  • Runtime management — install, use, list, current, uninstall, which, remote, rust, why, resolve, exec, run, env, template, shell, hook, deactivate, prune\n  • Project & configuration — init, check, status, project, import, export, profile, config, alias\n  • Data & environment — shim, cache, bundle\n  • Diagnostics & information — doctor, debug, diagnostics, completion, help, update"
cli.help.command_tiers = "Design tiers (CLI design doc §2; full matrix: docs/cli/commands.md):\n  • L1 essential — install, use, list, current, uninstall, which, remote, doctor\n  • L2 enhanced — config, alias, prune, update, resolve, shell; also init, check, project, hook, deactivate, why, rust\n  • L3 automation — exec, run, env, import, export, profile, status, template\n  • Platform & data — shim, cache, bundle, debug, diagnostics, completion, help, update"
cli.help.completion.after_long = "脚本首行注释指向 `envr help shortcuts`（内置 argv 简写在 clap 之前生效，补全无法单独列出这些 token）。"
cli.help.exec.after_long = "对「已有可执行文件」做单语言 PATH/环境增强（例如 `node` / `python`）。\n不解析 `.envr.toml` 中的 `[scripts]`；项目脚本任务请用 `envr run`。"
cli.help.global.debug = "Debug: emit tracing to stderr; default `RUST_LOG=debug` when unset."
cli.help.global.format = "Output format (`text` or `json`). Default: `text`."
cli.help.global.format_long = "`text`: human-readable. `json`: one JSON line per envelope for automation."
cli.help.global.no_color = "Disable ANSI color in terminal output."
cli.help.global.porcelain = "Script-friendly plain text output (no labels/decorations; alias: --plain)."
cli.help.global.quiet = "Suppress non-error output."
cli.help.global.quiet_long = "In `text` mode, envr errors print only one `[E_*]` line (easy to grep); in `json` mode the envelope `message` is shortened to the same tag."
cli.help.global.runtime_root = "Override runtime root directory (sets `ENVR_RUNTIME_ROOT`)."
cli.help.run.after_long = "多语言合并 PATH + 项目 `env` 的「项目任务编排」入口；支持 `[scripts]` 命名任务。\n单语言、只包装一个可执行文件时请用 `envr exec`。"
cli.help.shell.after_long = "适合「只在当前终端会话」临时使用 pin 与项目 env；不会改变 `envr use` 写入的全局 current。"
cli.help.shortcuts.completion_hint = "Completion scripts include a header comment pointing here: `envr completion <shell>`"
cli.help.shortcuts.note = "These rewrite argv before clap parses. User-defined names live in `config/aliases.toml` under the runtime root and override built-ins."
cli.help.shortcuts.title = "Built-in argv shorthands (preprocess_cli_args)"
cli.help.use.after_long = "此命令修改全局默认版本，新开终端也会沿用。\n若只想在当前终端临时使用合并后的环境，请用 `envr shell`（交互子 shell）、`envr exec`（单语言子进程），或在 POSIX shell 中执行 `eval \"$(envr env …)\"` 导入环境。"
